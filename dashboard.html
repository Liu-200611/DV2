<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Malaysia Quid Chewing Prevalence Dashboard</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background-image: url("background.jpg");
      background-repeat: repeat;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: auto;
    }

    main {
      box-sizing: border-box;
      width: max-content;
      min-width: min(100%, 1040px);
      margin: 0 auto;
      padding: 24px 16px 40px;
      background-image: url("background.jpg");
      background-repeat: repeat;
    }

    #vis {
      width: max-content;
      max-width: none;
      overflow-x: visible;
    }

    #vis > details,
    .vega-actions {
      display: none;
    }

    .dashboard-error {
      box-sizing: border-box;
      margin: 0 auto;
      max-width: 720px;
      padding: 16px;
      border: 1px solid #c94f4f;
      background: #fff4f4;
      color: #7c1f1f;
      font-size: 15px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <div id="vis"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <script>
    vegaEmbed("#vis", "dashboard.vl", {
      actions: false,
      renderer: "svg"
    }).catch(function (error) {
      console.error(error);
      document.querySelector("#vis").innerHTML =
        '<div class="dashboard-error">The dashboard could not be rendered. Check that dashboard.vl and the data files are available from the local server.</div>';
    });
  </script>
</body>
</html>
